<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — Martin Harasimowicz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FAFAF8;
      --surface: #FFFFFF;
      --text: #1A1A1A;
      --text-secondary: #5C5C5C;
      --accent: #2D5A3D;
      --border: #E4E2DD;
      --radius: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      backdrop-filter: blur(16px);
      background: rgba(250,250,248,.85);
      border-bottom: 1px solid var(--border);
    }
    nav .inner {
      max-width: 900px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px;
    }
    nav .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem; color: var(--text);
      text-decoration: none; letter-spacing: -.01em;
    }
    nav .links { display: flex; gap: 1.75rem; }
    nav .links a {
      font-size: .85rem; font-weight: 500; color: var(--text-secondary);
      text-decoration: none; letter-spacing: .02em;
      transition: color .2s;
    }
    nav .links a:hover { color: var(--accent); }

    .resume-page {
      max-width: 900px; margin: 0 auto;
      padding: 7rem 2rem 3rem;
    }

    .resume-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    .resume-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem; letter-spacing: -.01em;
    }
    .btn {
      display: inline-flex; align-items: center; gap: .45rem;
      padding: .7rem 1.5rem;
      font-size: .875rem; font-weight: 600; font-family: inherit;
      border-radius: var(--radius); text-decoration: none;
      transition: all .2s;
      cursor: pointer; border: none;
      background: var(--accent); color: #fff;
    }
    .btn:hover { background: #234A30; }
    .btn svg { width: 16px; height: 16px; }

    .pdf-container {
      width: 100%;
      aspect-ratio: 8.5 / 11;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
    }
    .pdf-container iframe {
      width: 100%; height: 100%; border: none;
    }

    .pdf-fallback {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
    }
    .pdf-fallback p { margin-bottom: 1.5rem; }

    footer {
      max-width: 900px; margin: 0 auto;
      padding: 3rem 2rem;
      border-top: 1px solid var(--border);
      font-size: .8rem; color: var(--text-secondary);
      text-align: center;
    }

    @media (max-width: 700px) {
      .pdf-container { display: none; }
      .pdf-fallback { display: block; }
    }
  </style>
</head>
<body>

<nav>
  <div class="inner">
    <a class="logo" href="index.html">MH</a>
    <div class="links">
      <a href="index.html#about">About</a>
      <a href="index.html#projects">Projects</a>
      <a href="resume.html">Resume</a>
    </div>
  </div>
</nav>

<main class="resume-page">
  <div class="resume-header">
    <h1>Resume</h1>
    <a class="btn" href="resume.pdf" download>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
      Download PDF
    </a>
  </div>

  <div class="pdf-container">
    <iframe src="resume.pdf" title="Resume"></iframe>
  </div>

  <div class="pdf-fallback">
    <p>PDF preview isn't available on mobile. Tap below to download.</p>
    <a class="btn" href="resume.pdf" download>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
      Download PDF
    </a>
  </div>
</main>

<footer>
  &copy; 2026 Martin Harasimowicz
</footer>

</body>
</html>
